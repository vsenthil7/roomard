{{- range $key, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: roomard-{{ kebabcase $key }}
  labels:
    app.kubernetes.io/name: roomard
    app.kubernetes.io/component: {{ kebabcase $key }}
spec:
  replicas: {{ default 2 $svc.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: roomard
      app.kubernetes.io/component: {{ kebabcase $key }}
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata:
      labels:
        app.kubernetes.io/name: roomard
        app.kubernetes.io/component: {{ kebabcase $key }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: {{ kebabcase $key }}
          image: "{{ $.Values.global.imageRegistry }}/{{ kebabcase $key }}:{{ $.Values.global.imageTag }}"
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports: [{ name: http, containerPort: 3000, protocol: TCP }]
          env:
            - { name: NODE_ENV, value: "{{ $.Values.global.environment }}" }
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: { name: {{ $.Values.postgres.externalConnectionSecret }}, key: url }
            - name: REDIS_URL
              valueFrom:
                secretKeyRef: { name: {{ $.Values.redis.externalConnectionSecret }}, key: url }
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef: { name: {{ $.Values.secrets.jwt }}, key: secret }
            {{- range $envKey, $envVal := $svc.env }}
            - { name: "{{ $envKey }}", value: "{{ $envVal }}" }
            {{- end }}
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            {{- toYaml (default (dict "requests" (dict "cpu" "100m" "memory" "256Mi") "limits" (dict "cpu" "500m" "memory" "512Mi")) $svc.resources) | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
---
apiVersion: v1
kind: Service
metadata:
  name: roomard-{{ kebabcase $key }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: roomard
    app.kubernetes.io/component: {{ kebabcase $key }}
  ports:
    - { name: http, port: 80, targetPort: http, protocol: TCP }
{{- end }}
{{- end }}
