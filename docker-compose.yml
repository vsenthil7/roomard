# Roomard local development environment.
# Spin up with: docker compose up -d
# Tear down with: docker compose down -v

services:
  postgres:
    image: postgres:16-alpine
    container_name: roomard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: roomard
      POSTGRES_PASSWORD: roomard_dev_pwd
      POSTGRES_DB: roomard
      # Enables pg_stat_statements + uuid-ossp via shared_preload_libraries below.
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=en_US.UTF-8 --lc-ctype=en_US.UTF-8"
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "log_statement=ddl"
      - "-c"
      - "max_connections=200"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roomard -d roomard"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: roomard-redis
    restart: unless-stopped
    command:
      - "redis-server"
      - "--save"
      - "60"
      - "1"
      - "--maxmemory"
      - "256mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    # S3-compatible object store for local dev (replaces Baidu BOS / AWS S3).
    image: minio/minio:latest
    container_name: roomard-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: roomard_minio
      MINIO_ROOT_PASSWORD: roomard_minio_dev_pwd
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    # Creates the default bucket for evidence storage on startup.
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - "/bin/sh"
      - "-c"
      - |
        mc alias set local http://minio:9000 roomard_minio roomard_minio_dev_pwd &&
        mc mb --ignore-existing local/roomard-evidence &&
        mc mb --ignore-existing local/roomard-audit &&
        mc anonymous set none local/roomard-evidence &&
        mc anonymous set none local/roomard-audit &&
        echo "MinIO buckets ready"

  mailpit:
    # Local SMTP capture for outbound email tests.
    image: axllent/mailpit:latest
    container_name: roomard-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  default:
    name: roomard-network
